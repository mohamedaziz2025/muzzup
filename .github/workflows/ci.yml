name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  JWT_ACCESS_SECRET: ci-access-secret-needs-32-characters-min
  JWT_REFRESH_SECRET: ci-refresh-secret-needs-32-characters-min
  TOTP_ENCRYPTION_KEY: ci-totp-encryption-key-32-characters-min
  MONGODB_URI: mongodb://localhost:27017/muzzap-ci
  REDIS_URL: redis://localhost:6379
  WEB_URL: http://localhost:3000
  API_URL: http://localhost:4000

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
